<!DOCTYPE html>
<html lang="en">
<head>
    <title>Quick Pass - Welcome</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        .container { width: 300px; margin: 50px auto; background: white; padding: 20px; border-radius: 8px; }
        input { width: 90%; padding: 10px; margin: 10px 0; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
        marquee { position: fixed; bottom: 0; width: 100%; background: #333; color: yellow; padding: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Quick Pass Registration</h2>
        <input type="text" id="regName" placeholder="Full Name">
        <input type="email" id="regEmail" placeholder="Email Address">
        <input type="number" id="regPhone" placeholder="Phone Number (Password)">
        <button onclick="register()">Register</button>
        <p>Already have an account? <a href="LOGIN.HTML">Login here</a></p>
    </div>

    <marquee>🚀 Get your Quick Pass today! Fast entry to Youth Concert, Easter Extravaganza, and more! 🎟️</marquee>

    <script>
        function register() {
            // Logic to send data to Google Apps Script
            alert("Registration successful! Redirecting to Dashboard...");
            window.location.href = "DASHBOARD.HTML";
        }
    </script>
</body>
</html>
